version: "3.8"

services:

  app:
    container_name: knote-app

    image: learnitguide/knotejs:1.0

    ports:
      - "80:3000"

    environment:
      MONGO_URL: mongodb://mongo_db_host:27017/dev

    depends_on:
      - mongo

    links:
      - mongo:mongo_db_host

    restart: always

  mongo:
    container_name: knote-mongo

    image: mongo:latest

    ports:
      - "27017:27017"

    restart: always

    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
